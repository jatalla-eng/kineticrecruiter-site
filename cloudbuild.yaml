steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/kineticrecruiter/site:$COMMIT_SHA'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/kineticrecruiter/site:latest'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/kineticrecruiter/site:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/kineticrecruiter/site:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'kineticrecruiter-site'
      - '--image'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/kineticrecruiter/site:$COMMIT_SHA'
      - '--region'
      - 'australia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'

  # Step 4: Purge Cloud CDN so fresh content is served immediately.
  # --async so this doesn't block the build waiting for the invalidation to finish.
  # Requires the Cloud Build service account to have compute.urlMaps.invalidateCache
  # (granted via roles/compute.loadBalancerAdmin or a custom role). If this step
  # fails with PERMISSION_DENIED on first run, grant the role and retrigger.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'compute'
      - 'url-maps'
      - 'invalidate-cdn-cache'
      - 'kineticrecruiter-urlmap'
      - '--path=/*'
      - '--global'
      - '--async'

  # Step 5: Notify Bing / DuckDuckGo / Yandex of all sitemap URLs via IndexNow.
  # Idempotent and non-fatal — the script exits 0 even on error so it never
  # fails a deploy. Google ignores IndexNow; it discovers via sitemap recrawl.
  - name: 'node:20-slim'
    entrypoint: node
    args: ['scripts/ping-indexnow.js']

images:
  - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/kineticrecruiter/site:$COMMIT_SHA'
  - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/kineticrecruiter/site:latest'

options:
  logging: CLOUD_LOGGING_ONLY
